<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мой Roblox</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: sans-serif; }
  #ui { position: fixed; top: 10px; left: 10px; z-index: 10; color: white; }
  #auth-box { background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; width: 220px; }
  #auth-box input { width: 100%; margin: 4px 0; padding: 6px; box-sizing: border-box; }
  #auth-box button { width: 100%; padding: 6px; margin-top: 4px; cursor: pointer; }
  #chat-box { position: fixed; bottom: 10px; left: 10px; z-index: 10; width: 280px; }
  #chat-log { background: rgba(0,0,0,0.6); color: white; height: 150px; overflow-y: auto; padding: 6px; font-size: 13px; border-radius: 6px 6px 0 0; }
  #chat-input { width: 100%; box-sizing: border-box; padding: 6px; }
  canvas { display: block; touch-action: none; }
  #joystick { position: fixed; bottom: 90px; right: 30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.15); z-index: 10; display: none; }
  #joystick-knob { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.5); top: 30px; left: 30px; }
</style>
</head>
<body>

<div id="ui">
  <div id="auth-box">
    <div id="login-view">
      <input id="username" placeholder="Имя пользователя">
      <input id="password" type="password" placeholder="Пароль">
      <button onclick="doLogin()">Войти</button>
      <button onclick="doRegister()">Регистрация</button>
      <div id="auth-error" style="color:#f66;font-size:12px;"></div>
    </div>
    <div id="logged-view" style="display:none;">
      Вы вошли как <b id="me"></b>
    </div>
  </div>
</div>

<div id="chat-box">
  <div id="chat-log"></div>
  <input id="chat-input" placeholder="Написать в чат..." onkeydown="if(event.key==='Enter') sendChat()">
</div>

<div id="joystick"><div id="joystick-knob"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let token = null;
let myUsername = null;
let ws = null;
const players = {}; // username -> {mesh, targetPos}

// ---------- Auth ----------
async function doRegister() {
  await authRequest('/api/register');
}
async function doLogin() {
  await authRequest('/api/login');
}
async function authRequest(path) {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errBox = document.getElementById('auth-error');
  errBox.textContent = '';
  if (!username || !password) {
    errBox.textContent = 'Заполните поля';
    return;
  }
  try {
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errBox.textContent = data.detail || 'Ошибка';
      return;
    }
    token = data.token;
    myUsername = data.username;
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('logged-view').style.display = 'block';
    document.getElementById('me').textContent = myUsername;
    connectWS();
    if ('ontouchstart' in window) document.getElementById('joystick').style.display = 'block';
  } catch (e) {
    errBox.textContent = 'Сервер недоступен';
  }
}

// ---------- WebSocket (chat + позиции) ----------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${token}`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'chat') {
      logChat(`${msg.user}: ${msg.text}`);
    } else if (msg.type === 'move') {
      updateRemotePlayer(msg.user, msg.x, msg.y, msg.z);
    } else if (msg.type === 'join') {
      logChat(`* ${msg.user} присоединился`);
    } else if (msg.type === 'leave') {
      logChat(`* ${msg.user} вышел`);
      removeRemotePlayer(msg.user);
    }
  };
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'chat', text }));
  logChat(`Вы: ${text}`);
  input.value = '';
}

function logChat(text) {
  const log = document.getElementById('chat-log');
  const line = document.createElement('div');
  line.textContent = text;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ---------- 3D сцена (Three.js) ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x888888));

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50, 50),
  new THREE.MeshStandardMaterial({ color: 0x3a9d3a })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// несколько кубов-препятствий как в песочнице
for (let i = 0; i < 6; i++) {
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({ color: 0xcc6633 })
  );
  box.position.set((Math.random() - 0.5) * 20, 0.5, (Math.random() - 0.5) * 20);
  scene.add(box);
}

const player = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.4, 1, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0x3366ff })
);
player.position.set(0, 1, 0);
scene.add(player);

function makeRemoteMesh() {
  return new THREE.Mesh(
    new THREE.CapsuleGeometry(0.4, 1, 4, 8),
    new THREE.MeshStandardMaterial({ color: 0xff3366 })
  );
}

function updateRemotePlayer(user, x, y, z) {
  if (!players[user]) {
    const mesh = makeRemoteMesh();
    scene.add(mesh);
    players[user] = { mesh };
  }
  players[user].mesh.position.set(x, y, z);
}

function removeRemotePlayer(user) {
  if (players[user]) {
    scene.remove(players[user].mesh);
    delete players[user];
  }
}

// ---------- Управление ----------
const keys = {};
window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

let joyVec = { x: 0, y: 0 };
const joystick = document.getElementById('joystick');
const knob = document.getElementById('joystick-knob');
let joyActive = false;
joystick.addEventListener('touchstart', () => joyActive = true);
joystick.addEventListener('touchend', () => { joyActive = false; joyVec = { x: 0, y: 0 }; knob.style.top = '30px'; knob.style.left = '30px'; });
joystick.addEventListener('touchmove', (e) => {
  const rect = joystick.getBoundingClientRect();
  const touch = e.touches[0];
  let dx = (touch.clientX - rect.left - 50) / 50;
  let dy = (touch.clientY - rect.top - 50) / 50;
  dx = Math.max(-1, Math.min(1, dx));
  dy = Math.max(-1, Math.min(1, dy));
  joyVec = { x: dx, y: dy };
  knob.style.left = 30 + dx * 20 + 'px';
  knob.style.top = 30 + dy * 20 + 'px';
});

let lastSent = 0;
function animate(time) {
  requestAnimationFrame(animate);

  const speed = 0.1;
  let dx = 0, dz = 0;
  if (keys['w'] || keys['arrowup']) dz -= speed;
  if (keys['s'] || keys['arrowdown']) dz += speed;
  if (keys['a'] || keys['arrowleft']) dx -= speed;
  if (keys['d'] || keys['arrowright']) dx += speed;
  dx += joyVec.x * speed;
  dz += joyVec.y * speed;

  player.position.x += dx;
  player.position.z += dz;

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 8;
  camera.position.y = 5;
  camera.lookAt(player.position);

  if (ws && ws.readyState === 1 && time - lastSent > 100 && (dx !== 0 || dz !== 0)) {
    ws.send(JSON.stringify({ type: 'move', x: player.position.x, y: player.position.y, z: player.position.z }));
    lastSent = time;
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
