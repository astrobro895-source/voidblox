<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roblox Web 3D Clone</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #202020; color: white; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; }
        .interactive { pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; margin: 10px; }
        
        /* Панели меню */
        #menu-panel { width: 300px; max-height: 400px; overflow-y: auto; }
        #chat-panel { width: 350px; height: 200px; display: flex; flex-direction: column; }
        #chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 5px; font-size: 14px; }
        #studio-panel { position: absolute; right: 10px; top: 10px; width: 200px; }
        
        input, button { background: #444; color: white; border: 1px solid #666; padding: 6px; margin: 3px 0; border-radius: 4px; width: 100%; box-sizing: border-box; }
        button:hover { background: #555; cursor: pointer; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div style="display: flex; justify-content: space-between; width: 100%;">
            <div id="menu-panel" class="interactive">
                <h3>Roblox Web Dashboard</h3>
                <input type="text" id="username-input" placeholder="Твой никнейм" value="Player1">
                <hr>
                <h4>Создать Плейс (Студия)</h4>
                <input type="text" id="place-name-input" placeholder="Название нового мира">
                <button onclick="createNewPlace()">Опубликовать Плейс</button>
                <hr>
                <h4>Доступные Плейсы</h4>
                <div id="places-list">Загрузка...</div>
            </div>

            <div id="studio-panel" class="interactive hidden">
                <h3>🛠️ Roblox Studio</h3>
                <p style="font-size:12px;">Создание объектов в реальном времени:</p>
                <button onclick="spawnObjectInStudio('box')">+ Спавнить Куб</button>
                <button onclick="spawnObjectInStudio('sphere')">+ Спавнить Сферу</button>
                <button onclick="saveCurrentPlaceObjects()" style="background:#28a745;">Сохранить изменения</button>
            </div>
        </div>

        <div id="chat-panel" class="interactive hidden">
            <div id="chat-messages"></div>
            <div style="display: flex;">
                <input type="text" id="chat-input" placeholder="Нажми Enter для отправки..." onkeydown="if(event.key === 'Enter') sendChatMessage()">
            </div>
        </div>
    </div>

    <script>
        let socket = io();
        let scene, camera, renderer;
        let currentPlaceId = "1";
        let myUsername = "Player1";
        let localPlayerMesh;
        let otherPlayers = {}; 
        let moveState = { forward: false, backward: false, left: false, right: false };
        let placeObjects = []; // Объекты текущей студии/плейса

        // Инициализация 3D сцены
        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Небо

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Свет
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Земля (Baseplate)
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x3cb371 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Наш персонаж (Капсула/Куб)
            const pGeo = new THREE.BoxGeometry(1, 2, 1);
            const pMat = new THREE.MeshLambertMaterial({ color: 0xffff00 });
            localPlayerMesh = new THREE.Mesh(pGeo, pMat);
            localPlayerMesh.position.set(0, 1, 0);
            scene.add(localPlayerMesh);

            camera.position.set(0, 5, 10);
            camera.lookAt(localPlayerMesh.position);

            setupControls();
            animate();
        }

        // Управление клавиатурой (WASD)
        function setupControls() {
            window.addEventListener('keydown', (e) => {
                if(document.activeElement.tagName === 'INPUT') return; // Игнорируем, если пишем в чат
                if(e.code === 'KeyW') moveState.forward = true;
                if(e.code === 'KeyS') moveState.backward = true;
                if(e.code === 'KeyA') moveState.left = true;
                if(e.code === 'KeyD') moveState.right = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveState.forward = false;
                if(e.code === 'KeyS') moveState.backward = false;
                if(e.code === 'KeyA') moveState.left = false;
                if(e.code === 'KeyD') moveState.right = false;
            });
        }

        // Цикл рендеринга и отправки координат
        function animate() {
            requestAnimationFrame(animate);

            let moved = false;
            const speed = 0.1;
            if(moveState.forward) { localPlayerMesh.position.z -= speed; moved = true; }
            if(moveState.backward) { localPlayerMesh.position.z += speed; moved = true; }
            if(moveState.left) { localPlayerMesh.position.x -= speed; moved = true; }
            if(moveState.right) { localPlayerMesh.position.x += speed; moved = true; }

            if(moved) {
                // Привязываем камеру к игроку
                camera.position.set(localPlayerMesh.position.x, localPlayerMesh.position.y + 4, localPlayerMesh.position.z + 8);
                camera.lookAt(localPlayerMesh.position);
                
                // Передаем координаты серверу для мультиплеера
                socket.emit('move', {x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z});
            }

            renderer.render(scene, camera);
        }

        // --- ЛОГИКА СЕТИ И ВЗАИМОДЕЙСТВИЯ ---

        function loadPlacesList() {
            fetch('/api/places')
                .then(res => res.json())
                .then(data => {
                    const listDiv = document.getElementById('places-list');
                    listDiv.innerHTML = '';
                    Object.keys(data).forEach(id => {
                        listDiv.innerHTML += `<button onclick="enterPlace('${id}')">Зайти в: ${data[id].name}</button>`;
                    });
                });
        }

        function enterPlace(id) {
            currentPlaceId = id;
            myUsername = document.getElementById('username-input').value || "Guest";
            
            // Показываем чат и студию
            document.getElementById('chat-panel').classList.remove('hidden');
            document.getElementById('studio-panel').classList.remove('hidden');

            // Очищаем старых игроков с экрана
            Object.keys(otherPlayers).forEach(sid => scene.remove(otherPlayers[sid]));
            otherPlayers = {};

            // Запрашиваем данные мира и строим блоки плейса
            fetch('/api/places')
                .then(res => res.json())
                .then(data => {
                    // Удаляем старые кастомные объекты плейса со сцены
                    placeObjects.forEach(obj => scene.remove(obj));
                    placeObjects = [];

                    // Строим новые объекты плейса
                    const worldData = data[id];
                    worldData.objects.forEach(objData => {
                        spawnRenderedObject(objData);
                    });
                });

            // Подключаемся к сокет-комнате плейса
            socket.emit('join_place', { username: myUsername, place_id: currentPlaceId });
        }

        function spawnRenderedObject(data) {
            let geo = data.type === 'sphere' ? new THREE.SphereGeometry(0.7, 32, 32) : new THREE.BoxGeometry(1.5, 1.5, 1.5);
            let mat = new THREE.MeshLambertMaterial({ color: data.color || 0xff0000 });
            let mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(data.x, data.y, data.z);
            scene.add(mesh);
            placeObjects.push(mesh); // Для Студии, чтобы отслеживать
        }

        // Функции Студии (Добавление приколов на карту)
        function spawnObjectInStudio(type) {
            // Спавним объект перед игроком
            let objData = {
                type: type,
                x: localPlayerMesh.position.x,
                y: localPlayerMesh.position.y,
                z: localPlayerMesh.position.z - 3,
                color: Math.random() * 0xffffff
            };
            spawnRenderedObject(objData);
        }

        function saveCurrentPlaceObjects() {
            // Собираем все текущие объекты и отправляем на сервер для перезаписи плейса
            let objectsData = placeObjects.map(mesh => ({
                type: mesh.geometry.type === 'BoxGeometry' ? 'box' : 'sphere',
                x: mesh.position.x,
                y: mesh.position.y,
                z: mesh.position.z,
                color: mesh.material.color.getHex()
            }));

            // Перезаписываем или публикуем как новый плейс
            fetch('/api/places', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: "Студия Мир #" + currentPlaceId, objects: objectsData })
            }).then(() => {
                alert("Плейс успешно сохранен/переопубликован!");
                loadPlacesList();
            });
        }

        function createNewPlace() {
            let name = document.getElementById('place-name-input').value || "Новый Мир";
            fetch('/api/places', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: name, objects: [] })
            }).then(() => {
                loadPlacesList();
                document.getElementById('place-name-input').value = '';
            });
        }

        // --- ОБРАБОТКА МУЛЬТИПЛЕЕРА ЧЕРЕЗ СОКЕТЫ ---

        socket.on('current_players', (players) => {
            Object.keys(players).forEach(sid => {
                addOtherPlayer(sid, players[sid]);
            });
        });

        socket.on('player_joined', (data) => {
            addOtherPlayer(data.id, data);
            addLog(`🟢 ${data.username} зашел в игру.`);
        });

        socket.on('player_moved', (data) => {
            if(otherPlayers[data.id]) {
                otherPlayers[data.id].position.set(data.x, data.y, data.z);
            }
        });

        socket.on('player_left', (data) => {
            if(otherPlayers[data.id]) {
                scene.remove(otherPlayers[data.id]);
                delete otherPlayers[data.id];
            }
        });

        function addOtherPlayer(sid, data) {
            if(otherPlayers[sid]) return;
            let geo = new THREE.BoxGeometry(1, 2, 1);
            let mat = new THREE.MeshLambertMaterial({ color: 0x0000ff }); // Другие игроки синие
            let mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(data.x, data.y, data.z);
            scene.add(mesh);
            otherPlayers[sid] = mesh;
        }

        // --- ЧАТ ---
        function sendChatMessage() {
            let input = document.getElementById('chat-input');
            if(input.value.trim() !== "") {
                socket.emit('chat_message', { text: input.value });
                input.value = "";
            }
        }

        socket.on('new_chat_message', (data) => {
            addLog(data.msg);
        });

        function addLog(text) {
            let box = document.getElementById('chat-messages');
            box.innerHTML += `<div>${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // Погнали!
        window.onload = () => {
            init3D();
            loadPlacesList();
        };
    </script>
</body>
</html>
